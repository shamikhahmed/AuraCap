<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>AuraCap</title>
    <script>
      // GitHub Pages SPA redirect — https://github.com/rafgraph/spa-github-pages
      var pathSegmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  
  <link rel="stylesheet" href="../css/capricorn-core.css">
</head>
  <body>
<div class="cap-scroll-progress" aria-hidden="true"></div>
  <canvas id="cap-scene" class="cap-scene-canvas cap-scene-canvas--subtle" aria-hidden="true"></canvas>

  <script src="../js/vendor/gsap.min.js"></script>
  <script src="../js/vendor/ScrollTrigger.min.js"></script>
  <script src="../js/capricorn-scene.js"></script>
  <script src="../js/capricorn-motion.js"></script>
  <script src="../js/capricorn-cinematic.js"></script>
  <script>document.addEventListener('DOMContentLoaded',function(){if(window.CapCinematic)CapCinematic.init({canvas:'#cap-scene'});});</script>
</body>
</html>
